name: powerlifting_app
description: "电子教练 - AI-Powered Powerlifting Training Coach"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  uuid: ^4.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  intl: ^0.20.2
  http: ^1.3.0
  flutter_markdown: ^0.7.7
  shared_preferences: ^2.5.3
  google_generative_ai: ^0.4.6
  fl_chart: ^0.70.2
  table_calendar: ^3.2.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: NotoSansCJKsc
      fonts:
        - asset: assets/fonts/NotoSansCJKsc-Regular.otf
          weight: 400
        - asset: assets/fonts/NotoSansCJKsc-Bold.otf
          weight: 700
