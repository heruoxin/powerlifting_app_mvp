# 训练项目类型表
#
# 说明：
# 1. 这不是用户可见的模板库，而是工程层的项目类型元数据表。
# 2. 每个类型定义“它是什么”，而不是“这一天怎么练它”。
# 3. 记录需求优先通过 record profile 表达，再由具体计划实例做少量覆盖。

record_profiles:
  - key: "main_lift_lir_profile" # LIR = load / intensity / RPE
    display_name: "Competition Main Lift"
    default_visible_fields: ["load", "intensity", "rep", "rpe", "note"]
    load_mode: "numeric_mass" # numeric_mass | text_or_numeric | text_only | none
    supports_intensity: true
    supports_rpe: true
    supports_rep: true
    supports_duration: false
    supports_distance: false
    auto_projection_rule_key: "main_lift_lir_v1"
    prefer_single_direct_input: true
    note: "比赛主项默认启用 load / intensity / RPE 三者联动。"

  - key: "load_reps_profile"
    display_name: "Load + Reps"
    default_visible_fields: ["load", "rep", "note"]
    load_mode: "numeric_mass"
    supports_intensity: false
    supports_rpe: false
    supports_rep: true
    supports_duration: false
    supports_distance: false
    auto_projection_rule_key: null
    prefer_single_direct_input: false
    note: "变式与常见辅助力量动作默认使用这类记录需求。"

  - key: "bodyweight_reps_profile"
    display_name: "Bodyweight Reps"
    default_visible_fields: ["load", "rep", "note"]
    load_mode: "text_or_numeric"
    supports_intensity: false
    supports_rpe: false
    supports_rep: true
    supports_duration: false
    supports_distance: false
    auto_projection_rule_key: null
    prefer_single_direct_input: false
    note: "适用于引体向上、俯卧撑等自重动作，也兼容辅助或外挂重量。"

  - key: "timed_hold_profile"
    display_name: "Timed Hold"
    default_visible_fields: ["load", "duration", "note"]
    load_mode: "text_or_numeric"
    supports_intensity: false
    supports_rpe: false
    supports_rep: false
    supports_duration: true
    supports_distance: false
    auto_projection_rule_key: null
    prefer_single_direct_input: false
    note: "适用于平板支撑、悬垂等计时保持类动作。"

  - key: "distance_time_cardio_profile"
    display_name: "Distance + Time Cardio"
    default_visible_fields: ["distance", "duration", "note"]
    load_mode: "none"
    supports_intensity: false
    supports_rpe: false
    supports_rep: false
    supports_duration: true
    supports_distance: true
    auto_projection_rule_key: null
    prefer_single_direct_input: false
    note: "适用于游泳、跑步、划船机等距离/时间并存的有氧项目。"

