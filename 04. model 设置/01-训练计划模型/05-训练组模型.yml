# 训练组模型
#
# 说明：
# 1. 单组仍然是训练计划处方的最小单位。
# 2. 这里不记录 actual；actual 仍属于 training_record。
# 3. 单组同时允许保存 authored 与 derived 的目标值，但需要用 origin 标记真相来源。
# 4. `primary_prescription_field` 只描述本组的主要处方基准；rep / duration / distance 仍可与它并存。

schema:
  plan_set:
    uid: "<hex>" # 稳定主键。
    exercise_item_uid: "<hex>" # 所属训练项目实例。
    set_order_in_item: 1 # 在当前项目中的组序。
    tags: # warmup | top_set | backoff | work_set | drop_set | amrap | cooldown | custom
      - "top_set"
    is_optional: false # 是否允许在计划阅读上视为可选组。
    primary_prescription_field: "load" # load | intensity | rpe | duration | distance | mixed | none
    target:
      load:
        value: [112.5] # 处方型数值仍沿用 [single] / [min,max] / [min,null] 语法。
        unit: "kg|null" # kg | lb | null
        text: "<string|null>" # 自重 / 辅助 / 弹力带 等文本负荷。
        origin: "authored" # authored | derived | empty
      intensity:
        percent_1rm: [82.5] # 例如 82.5%。
        reference_lift_key: "bench_press|null" # 说明按哪一个主项强度参考估算。
        origin: "derived"
      rep:
        value: [3] # 固定值或范围值。
        origin: "authored"
      rpe:
        value: [8.0, 9.0] # 首版允许保存范围。
        origin: "derived"
      duration:
        value: null # 时间型动作时使用。
        unit: "second|null" # second | minute | null
        origin: "empty"
      distance:
        value: null # 距离型动作时使用。
        unit: "m|null" # m | km | lap | null
        origin: "empty"
      note:
        text: "Top set"
        origin: "authored"
    projection_rule_key: "main_lift_lir_v1|null" # 记录当时使用的投影/换算规则版本，便于未来迁移。

