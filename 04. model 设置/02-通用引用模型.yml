# 通用引用模型
#
# 目标：
# 1. 让训练笔记、AI 对话、后续 AI 教练模型共用同一套引用对象。
# 2. 让引用既能被程序稳定解析，也能直接被 UI 渲染成用户可见卡片。
# 3. visible_card 中必须允许多行正文，以适配 AI 教练页中的上下文卡片展示。
# 4. prompt_snapshot 必须优先服务 AI 理解，不应退化成一句短摘要。

schema:
  object_ref:
    uid: "<hex>" # 引用对象自己的 uid，不等于被引用对象的 uid。
    relation_role: "primary" # primary | secondary | auto_linked | quoted | related_note
    target_domain: "training_plan" # training_plan | training_record | note | ai_thread
    target_type: "plan_day" # 例如 training_plan / mesocycle / week / plan_day / plan_exercise_block / plan_set / training_record / exercise_block / set / note
    target_uid: "<hex>" # 被引用对象的稳定主键。
    source_page: "plan_detail" # 引用最初是从哪个页面上下文产生的。
    path:
      - object_type: "training_plan" # 从根对象到目标对象的路径链。
        object_uid: "<hex>"
        label: "<string>"
    prompt_snapshot:
      scope: "full_plan_day" # full_note | full_plan_day | full_exercise_block | full_training_record | full_object
      content_format: "markdown" # markdown | yaml | plain_text
      focus_hint: "<string>" # 告诉 AI：当前真正被引用的焦点是什么、该优先关注哪里。
      # 规则：
      # 1. 若 target 是 note，则这里应尽量放整篇笔记全文，而不是一句摘要。
      # 2. 若 target 是 training_record 下的某一组 set，则这里应尽量放该次完整 training_record，并重点标记该组。
      # 3. 若 target 是 training_plan 下的某一组 plan_set，则这里至少应放完整 plan_day，必要时可扩展到完整 exercise_block。
      content: "<multiline string>" # 面向 AI 的富上下文快照，允许多行，且可以明显标出 focus 对象。
    visible_card:
      badges: [] # 用于 UI 上显示的小标签。
      title: "<string>" # 卡片主标题。
      subtitle: "<string|null>" # 卡片副标题。
      body_lines: [] # 面向用户可见的多行正文。
      footer: "<string|null>" # 页脚补充说明。
      deep_link_label: "<string|null>" # 点击卡片后跳回原对象时的按钮文案。
    captured_at: "ISO8601" # 这份引用快照被生成的时间。

examples:
  example_plan_set_ref:
    uid: "ab41d29f70ce" # 这是“引用对象本身”的 uid，不是计划组的 uid。
    relation_role: "primary" # 这条引用是当前内容讨论的主对象，所以标成 primary。
    target_domain: "training_plan" # 目标对象属于训练计划域。
    target_type: "plan_set" # 目标精确到训练计划里的某一组。
    target_uid: "a13f0e9b8c42" # 这就是被引用的计划 set uid。
    source_page: "plan_detail" # 用户是在计划详情页里点进来的，所以 source_page 是 plan_detail。
    path:
      - object_type: "training_plan" # 路径第一层指向整份训练计划。
        object_uid: "7f21c8a4d0be" # 对应 2026 春季卧推强化这份计划。
        label: "2026 春季卧推强化" # 给 UI 和 AI 的可读标签。
      - object_type: "mesocycle" # 路径第二层指向当前中周期。
        object_uid: "5a0cf91b3d82" # 当前 active mesocycle 的 uid。
        label: "Base · Strength Base" # 用户可见的中周期摘要。
      - object_type: "week" # 路径第三层是 W3。
        object_uid: "44b0d8f1ca92" # W3 的 uid。
        label: "W3" # 简短显示成 W3 即可。
      - object_type: "plan_day" # 路径第四层是 D2。
        object_uid: "2ed91f6a4c38" # W3 D2 的训练日 uid。
        label: "W3 D2 卧推日" # 用户一眼能看懂的定位文本。
      - object_type: "plan_exercise_block" # 路径第五层是卧推动作块。
        object_uid: "5d9f3bc1a4e2" # 卧推动作块 uid。
        label: "卧推" # 动作名。
      - object_type: "plan_set" # 路径最后一层才是具体的组。
        object_uid: "a13f0e9b8c42" # 目标组 uid。
        label: "Set 1 · Top set" # 精确定位到具体组。
    prompt_snapshot:
      scope: "full_plan_day" # 引用的是某一条计划 set，但给 AI 时至少带完整训练日更合理。
      content_format: "markdown" # 使用 markdown 更方便后续直接塞进 AI 上下文。
      focus_hint: "当前引用焦点是 W3 D2 卧推 Set 1 · Top set。请重点关注这一组，但不要忽略同训练日其余计划内容。" # 明确告诉 AI 焦点在哪。
      content: | # 这里不是一句摘要，而是一份完整的 AI 上下文快照。
        # 训练计划引用快照
        计划：2026 春季卧推强化
        中周期：Base · Strength Base
        周：W3
        训练日：W3 D2 卧推日

        当前引用焦点：
        >> 卧推 Set 1 · Top set
        >> 112.5kg x3
        >> 目标：82.5% E1RM / 预计 RPE 8.0
        >> 备注：Top set

        同训练日完整计划：
        - 卧推
          - Set 1 · Top set：112.5kg x3，目标 RPE 8.0
          - Set 2 · Backoff 1：100kg x5，目标 RPE 6.5
          - Set 3 · Backoff 2：100kg x5，目标 RPE 7.0
        - 哥本哈根平板支撑
          - Set 1：自重 x10，每侧
    visible_card:
      badges: ["计划", "D2", "Top set"] # 这些 badge 适合直接显示在卡片顶部。
      title: "W3 D2 卧推日" # 卡片标题用训练日维度最直观。
      subtitle: "卧推 · Set 1" # 副标题进一步收窄到动作与组。
      body_lines:
        - "112.5kg x3" # 第一行优先展示用户最关心的负荷与次数。
        - "目标：82.5% E1RM / 预计 RPE 8.0" # 第二行放推测信息，允许多行显示。
        - "备注：Top set" # 第三行放备注，后续 UI 可按行折叠或截断。
      footer: "来自 2026 春季卧推强化" # 页脚告诉用户这张卡来源于哪份计划。
      deep_link_label: "查看原计划组" # 点卡片时的返回原对象文案。
    captured_at: "2026-04-02T08:55:00+08:00" # 记录引用快照生成时间，方便后续比对是否过时。

  example_training_record_set_ref:
    uid: "5e7a90cb214f" # 这是训练记录引用对象自己的 uid。
    relation_role: "auto_linked" # 这类引用往往来自训练中的自动关联，所以角色写成 auto_linked。
    target_domain: "training_record" # 目标域变成训练记录域。
    target_type: "set" # 精确到训练记录中的某一组。
    target_uid: "6ef3d17a0bb4" # 目标是训练记录里对应的 set uid。
    source_page: "training_workbench" # 引用是从训练中工作台自动带过来的。
    path:
      - object_type: "training_record" # 路径第一层就是 training_record。
        object_uid: "8b4e07a5fc39" # 当前训练会话 uid。
        label: "2026-04-02 · W3 D2 卧推日" # 用户能直接看懂的训练记录标题。
      - object_type: "exercise_block" # 第二层是动作块。
        object_uid: "5d9f3bc1a4e2" # 卧推动作块 uid。
        label: "卧推" # 动作名。
      - object_type: "set" # 第三层是具体组。
        object_uid: "6ef3d17a0bb4" # 组 uid。
        label: "Set 2" # 组标签。
    prompt_snapshot:
      scope: "full_training_record" # 当前只引用某一组，但 AI 需要看到整场训练记录。
      content_format: "markdown" # 用 markdown 表达完整训练记录快照。
      focus_hint: "当前引用焦点是 2026-04-02 W3 D2 卧推 Set 2。AI 讨论时应基于完整训练记录理解它，而不是只看这一组。" # 明确告诉 AI 不要只盯着单组。
      content: |
        # 训练记录引用快照
        训练日期：2026-04-02
        训练定位：W3 D2 卧推日
        training_record.state：completed

        当前引用焦点：
        >> 卧推 Set 2
        >> 实际：100kg x5
        >> 备注：Backoff 1
        >> 结果：按计划

        本次完整训练记录：
        - 卧推
          - Set 1：112.5kg x3，Top set，@8.0，按计划
          - Set 2：100kg x5，Backoff 1，@6.5，按计划
          - Set 3：97.5kg x5，Backoff 2，@8.0，下调完成
          - Set 4：skipped
          - Set 5：未执行
        - 泽奇深蹲
          - Set 1：120kg x8，@7.0，按计划
          - Set 2：120kg x8，@7.5，按计划
          - Set 3：120kg x8，@8.0，按计划
    visible_card:
      badges: ["训练记录", "已完成"] # 这张卡属于训练记录，并且这组已经完成。
      title: "2026-04-02 · W3 D2 卧推日" # 标题优先展示训练会话定位。
      subtitle: "卧推 · Set 2" # 副标题告诉用户具体是哪一组。
      body_lines:
        - "实际：100kg x5" # 第一行给出实际完成值。
        - "结果：按计划" # 第二行给出结果标签。
        - "备注：Backoff 1" # 第三行保留组备注。
      footer: "来源于训练中工作台自动关联" # 页脚说明为什么会出现在这里。
      deep_link_label: "查看训练记录" # 点卡后回到训练记录。
    captured_at: "2026-04-02T09:41:10+08:00" # 自动关联发生的时间。

  example_note_ref:
    uid: "3f09b4c2de71" # 这是一条指向另一条笔记的引用对象 uid。
    relation_role: "related_note" # 它不是当前正文的主对象，而是一条相关笔记。
    target_domain: "note" # 目标域是笔记。
    target_type: "note" # 目标类型就是 note 本身。
    target_uid: "91f0b3d7ae24" # 被引用的笔记 uid。
    source_page: "notes_user" # 它来自用户笔记页。
    path:
      - object_type: "note" # 指向 note 时，路径可以只有一层。
        object_uid: "91f0b3d7ae24" # 目标笔记 uid。
        label: "卧推底部发软对照" # 目标笔记标题就是最自然的 label。
    prompt_snapshot:
      scope: "full_note" # 引用的是整篇笔记，所以这里应尽量给 AI 全文。
      content_format: "markdown" # 笔记原文天然适合 markdown。
      focus_hint: "当前引用对象是整篇用户笔记《卧推底部发软对照》。AI 应直接阅读全文，而不是只看摘要。" # 明确这是一整篇笔记。
      content: |
        # 用户笔记全文
        标题：卧推底部发软对照

        对比了最近两次同槽位卧推。

        - W2 D2：下放稳定，但起推略慢
        - W3 D2：第三组后底部明显发软
        - 猜测与肩胛稳定和疲劳累积同时有关

        下次开始训练前，想先看一眼这个问题有没有再次出现。
    visible_card:
      badges: ["笔记", "相关"] # UI 上展示成一张相关笔记卡。
      title: "卧推底部发软对照" # 卡片主标题就是笔记标题。
      subtitle: "用户笔记" # 用副标题说明对象类型。
      body_lines:
        - "比较了 W2 D2 与 W3 D2 的卧推底部稳定性。" # 第一行摘要。
        - "结论：疲劳上来后，底部发软明显加重。" # 第二行给出核心判断。
      footer: "点击可查看原笔记" # 页脚提示这张卡可以深跳。
      deep_link_label: "查看原笔记" # 跳转按钮文案。
    captured_at: "2026-04-03T10:15:00+08:00" # 引用快照生成时间。
